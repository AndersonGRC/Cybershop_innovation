# Nginx server block para admin.cybershopcol.com
#
# Instalar en el VPS:
#   sudo cp deploy/nginx.admin.conf /etc/nginx/sites-available/admin.cybershopcol.com
#   # IMPORTANTE: editar 'allow <TU_IP>;' con la(s) IP(s) reales
#   sudo nano /etc/nginx/sites-available/admin.cybershopcol.com
#   sudo ln -s /etc/nginx/sites-available/admin.cybershopcol.com /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# DNS: crear A record  admin.cybershopcol.com -> 38.134.148.47
#
# TLS (Let's Encrypt):
#   sudo certbot --nginx -d admin.cybershopcol.com

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name admin.cybershopcol.com;

    # Certbot ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS (certbot llena las directivas ssl_* despues de correr --nginx)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.cybershopcol.com;

    # ──────────────────────────────────────────────
    # IP allow-list  -- editar con TU(s) IP(s)
    # ──────────────────────────────────────────────
    # Descomentar y agregar las IPs autorizadas. Si vas a acceder desde
    # IPs dinamicas, considera VPN (Tailscale, WireGuard) en vez de esto.

    # allow 1.2.3.4;        # tu IP de oficina/casa
    # allow 5.6.7.8;        # IP del socio
    # deny all;

    # Si comentas las dos lineas de arriba: la URL queda publica
    # (solo protegida por el login del panel). Aceptable para arrancar.

    # ──────────────────────────────────────────────
    # Headers de seguridad
    # ──────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ──────────────────────────────────────────────
    # Proxy al Flask
    # ──────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts razonables (crear tenant puede tardar ~5s)
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Logs separados del cybershop principal
    access_log /var/log/nginx/admin.cybershopcol.com-access.log;
    error_log  /var/log/nginx/admin.cybershopcol.com-error.log;

    # Body size razonable
    client_max_body_size 2M;
}
